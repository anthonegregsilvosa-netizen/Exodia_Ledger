<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Budget Tracker</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    .budget-wrap { padding: 20px; }

    .budget-card {
      background: #fff;
      border: 1px solid #ead7c3;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .budget-title {
      margin: 0 0 12px 0;
      font-size: 28px;
      font-weight: 700;
    }

    .budget-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .budget-field label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .budget-field input,
    .budget-field select,
    .budget-field textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d6a067;
      border-radius: 10px;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;
    }

    .budget-field textarea {
      min-height: 90px;
      resize: vertical;
    }

    .budget-top-menu {
      margin-bottom: 8px;
    }

    .budget-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .budget-btn {
      border: 1px solid #d67d1f;
      background: #ff7a00;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .budget-btn.secondary {
      background: #fffaf5;
      color: #7a4a00;
    }

    .budget-hidden {
      display: none;
    }

    .budget-table-wrap {
      overflow-x: auto;
      margin-top: 12px;
    }

    .budget-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      min-width: 760px;
    }

    .budget-table th,
    .budget-table td {
      border: 1px solid #ead7c3;
      padding: 10px;
      text-align: left;
      vertical-align: middle;
    }

    .budget-table th {
      background: #141414;
      color: #fff;
      white-space: nowrap;
    }

    .budget-table input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 1px solid #d6a067;
      border-radius: 8px;
      text-align: right;
    }

    .budget-muted {
      color: #666;
      font-size: 13px;
    }

    .budget-empty {
      padding: 16px;
      border: 1px dashed #d6a067;
      border-radius: 12px;
      background: #fffaf5;
    }

    .budget-result-box {
      border: 1px solid #ead7c3;
      border-radius: 12px;
      padding: 16px;
      background: #fffaf5;
      margin-bottom: 16px;
    }

    .budget-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin: 12px 0 18px 0;
    }

    .budget-meta div {
      background: #fff;
      border: 1px solid #ead7c3;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .period-total-row td {
      font-weight: 700;
      background: #fff8ef;
    }

    .details-panel {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }

    .details-panel.show {
      display: flex;
    }

    .details-card {
      width: min(900px, 100%);
      max-height: 85vh;
      overflow: auto;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #ead7c3;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
      padding: 20px;
    }

    .details-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .details-close-btn {
      border: 1px solid #d6a067;
      background: #fffaf5;
      color: #7a4a00;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .mini-link {
      text-decoration: none;
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="app-header-left">
      <button id="menu-toggle" class="menu-toggle-btn" onclick="toggleSidebar()">☰</button>
    </div>
  </header>

  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <aside id="sidebar-menu">
    <div class="sidebar-header">
      <strong>Menu</strong>
      <button type="button" class="sidebar-close-btn" onclick="closeSidebar()">✕</button>
    </div>

    <nav class="sidebar-links">
      <a href="./index.html" onclick="closeSidebar()">Accounting Hub</a>
      <a href="./budget.html" onclick="closeSidebar()">Budget Tracker</a>
    </nav>
  </aside>

  <section class="budget-wrap">
    <div class="top-menu budget-top-menu">
      <button class="top-menu-btn" type="button" onclick="showBudgetSection('create')">Create Budget</button>
      <button class="top-menu-btn" type="button" onclick="showBudgetSection('results')">Budget Results</button>
    </div>
  </section>

  <section id="budget-create-section" class="budget-wrap">
    <div class="budget-card">
      <h2 class="budget-title">Create Budget</h2>
      <p class="budget-muted">
        Enter the budget amount per department/group. Click View Details to see the expense accounts under each one.
      </p>

      <div class="budget-grid">
        <div class="budget-field">
          <label for="budget-name">Budget Name</label>
          <input id="budget-name" type="text" placeholder="Example: Annual Budget 2026" />
        </div>

        <div class="budget-field">
          <label for="budget-year">Budget Year</label>
          <input id="budget-year" type="number" placeholder="2026" />
        </div>

        <div class="budget-field">
          <label for="budget-frequency">Frequency</label>
          <select id="budget-frequency">
            <option value="Monthly">Monthly</option>
            <option value="Quarterly">Quarterly</option>
            <option value="Semi-Annual">Semi-Annual</option>
            <option value="Yearly">Yearly</option>
          </select>
        </div>
      </div>

      <div class="budget-field">
        <label for="budget-notes">Notes</label>
        <textarea id="budget-notes" placeholder="Optional notes"></textarea>
      </div>

      <div class="budget-table-wrap">
        <table class="budget-table">
          <thead>
            <tr>
              <th style="width: 40%;">Department / Group</th>
              <th style="width: 25%;">Budget Amount</th>
              <th style="width: 35%;">Action</th>
            </tr>
          </thead>
          <tbody id="department-budget-body"></tbody>
        </table>
      </div>

      <div class="budget-actions">
        <button class="budget-btn" type="button" onclick="createBudgetResult()">Create Budget</button>
      </div>
    </div>
  </section>

  <section id="budget-results-section" class="budget-wrap budget-hidden">
    <div class="budget-card">
      <h2 class="budget-title">Budget Results</h2>
      <div id="budget-results-content" class="budget-empty">
        No budget created yet.
      </div>
    </div>
  </section>

  <div id="details-panel" class="details-panel" onclick="closeDetailsPanel(event)">
    <div class="details-card" onclick="event.stopPropagation()">
      <div class="details-header">
        <div>
          <h3 id="details-title" style="margin:0;">Department Details</h3>
          <div id="details-subtitle" class="budget-muted"></div>
        </div>
        <button class="details-close-btn" type="button" onclick="closeDetailsPanel()">Close</button>
      </div>

      <div class="budget-table-wrap">
        <table class="budget-table">
          <thead>
            <tr>
              <th>Expense Name</th>
            </tr>
          </thead>
          <tbody id="details-body"></tbody>
        </table>
      </div>
    </div>
  </div>

    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar-menu");
      const overlay = document.getElementById("sidebar-overlay");
      if (!sidebar || !overlay) return;
      sidebar.classList.toggle("open");
      overlay.classList.toggle("show");
    }

    function closeSidebar() {
      const sidebar = document.getElementById("sidebar-menu");
      const overlay = document.getElementById("sidebar-overlay");
      if (!sidebar || !overlay) return;
      sidebar.classList.remove("open");
      overlay.classList.remove("show");
    }

    function showBudgetSection(section) {
      const createSection = document.getElementById("budget-create-section");
      const resultsSection = document.getElementById("budget-results-section");

      if (section === "create") {
        createSection.classList.remove("budget-hidden");
        resultsSection.classList.add("budget-hidden");
      } else {
        createSection.classList.add("budget-hidden");
        resultsSection.classList.remove("budget-hidden");
      }
    }

    function formatMoney(value) {
      return Number(value || 0).toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function renderDepartmentBudgetRows() {
      const tbody = document.getElementById("department-budget-body");
      tbody.innerHTML = "";

      BUDGET_GROUPS.forEach((group, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(group)}</td>
          <td>
            <input
              type="number"
              min="0"
              step="0.01"
              placeholder="0.00"
              class="department-budget-input"
              data-group-index="${index}"
              oninput="updateGrandTotal()"
            />
          </td>
          <td>
            <button type="button" class="budget-btn secondary" onclick="openDetailsPanel('${escapeJs(group)}')">View Details</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      const totalRow = document.createElement("tr");
      totalRow.className = "period-total-row";
      totalRow.innerHTML = `
        <td>Grand Total</td>
        <td id="grand-total-cell" style="text-align:right;">0.00</td>
        <td></td>
      `;
      tbody.appendChild(totalRow);

      updateGrandTotal();
    }

    function updateGrandTotal() {
      let total = 0;
      document.querySelectorAll(".department-budget-input").forEach(input => {
        total += Number(input.value || 0);
      });

      const cell = document.getElementById("grand-total-cell");
      if (cell) cell.textContent = formatMoney(total);
    }

    function openDetailsPanel(groupName) {
      const panel = document.getElementById("details-panel");
      const title = document.getElementById("details-title");
      const subtitle = document.getElementById("details-subtitle");
      const body = document.getElementById("details-body");

      const items = DEPARTMENT_DETAILS[groupName] || [];

      title.textContent = `${groupName} Details`;
      subtitle.textContent = "Expense accounts under this department/group";
      body.innerHTML = items.map(name => `<tr><td>${escapeHtml(name)}</td></tr>`).join("");

      panel.classList.add("show");
    }

    function closeDetailsPanel(event) {
      if (event && event.target && event.target.id !== "details-panel") return;
      const panel = document.getElementById("details-panel");
      panel.classList.remove("show");
    }

    function createBudgetResult() {
      const budgetName = document.getElementById("budget-name").value.trim();
      const budgetYear = document.getElementById("budget-year").value.trim();
      const frequency = document.getElementById("budget-frequency").value;
      const notes = document.getElementById("budget-notes").value.trim();

      if (!budgetName || !budgetYear) {
        alert("Please fill in Budget Name and Budget Year.");
        return;
      }

      const groupBudgets = BUDGET_GROUPS.map((group, index) => {
        const input = document.querySelector(`.department-budget-input[data-group-index="${index}"]`);
        const amount = Number(input?.value || 0);

        return {
          group,
          amount,
          details: DEPARTMENT_DETAILS[group] || []
        };
      }).filter(item => item.amount > 0);

      if (!groupBudgets.length) {
        alert("Please enter at least one department/group budget amount.");
        return;
      }

      const grandTotal = groupBudgets.reduce((sum, item) => sum + Number(item.amount || 0), 0);

      latestBudgetResult = {
        budgetName,
        budgetYear,
        frequency,
        notes,
        groupBudgets,
        grandTotal
      };

      renderBudgetResult();
      showBudgetSection("results");
    }

    function renderBudgetResult() {
      const box = document.getElementById("budget-results-content");

      if (!latestBudgetResult) {
        box.innerHTML = "No budget created yet.";
        return;
      }

      const r = latestBudgetResult;

      const bodyHtml = r.groupBudgets.map(item => `
        <tr>
          <td>${escapeHtml(item.group)}</td>
          <td style="text-align:right;">${formatMoney(item.amount)}</td>
          <td>
            <button type="button" class="budget-btn secondary" onclick="openDetailsPanel('${escapeJs(item.group)}')">View Details</button>
          </td>
        </tr>
      `).join("");

      box.innerHTML = `
        <div class="budget-result-box">
          <h3 style="margin-top:0;">${escapeHtml(r.budgetName)}</h3>

          <div class="budget-meta">
            <div><strong>Year:</strong><br>${escapeHtml(r.budgetYear)}</div>
            <div><strong>Frequency:</strong><br>${escapeHtml(r.frequency)}</div>
            <div><strong>Grand Total:</strong><br>${formatMoney(r.grandTotal)}</div>
          </div>

          <div style="margin-bottom:16px;">
            <strong>Notes:</strong><br>
            ${escapeHtml(r.notes || "-")}
          </div>

          <div class="budget-table-wrap">
            <table class="budget-table">
              <thead>
                <tr>
                  <th>Department / Group</th>
                  <th>Budget Amount</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                ${bodyHtml}
                <tr class="period-total-row">
                  <td>Grand Total</td>
                  <td style="text-align:right;">${formatMoney(r.grandTotal)}</td>
                  <td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeJs(value) {
      return String(value ?? "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'");
    }

    renderDepartmentBudgetRows();
