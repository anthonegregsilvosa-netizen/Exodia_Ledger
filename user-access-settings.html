<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Invite User</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    body{
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:#f5f6f8;
      margin:0;
    }

    .invite-wrap{
      max-width: 760px;
      margin: 40px auto;
      padding: 0 16px;
    }

    .invite-card{
      background:#fff;
      border:1px solid #f0ddd0;
      border-radius:18px;
      box-shadow:0 12px 28px rgba(0,0,0,0.06);
      padding:28px;
    }

    .invite-title{
      font-family: Georgia, "Times New Roman", serif;
      font-size: 38px;
      margin: 0 0 8px;
      color:#181818;
    }

    .invite-sub{
      color:#666;
      margin-bottom:22px;
      font-size:14px;
    }

    .invite-grid{
      display:grid;
      gap:14px;
      max-width: 520px;
    }

    .invite-grid label{
      display:grid;
      gap:6px;
      font-size:14px;
      font-weight:600;
      color:#333;
    }

    .invite-grid input,
    .invite-grid select{
      width:100%;
      padding:12px 14px;
      border:1px solid #d8d8d8;
      border-radius:10px;
      font-size:14px;
      box-sizing:border-box;
      background:#fff;
    }

    .invite-grid input:focus,
    .invite-grid select:focus{
      outline:none;
      border-color:#ff6a00;
      box-shadow:0 0 0 4px rgba(255,106,0,0.12);
    }

    .invite-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .invite-btn{
      padding:12px 16px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
      font-size:14px;
    }

    .invite-btn.primary{
      background:#ff6a00;
      color:#fff;
    }

    .invite-btn.secondary{
      background:#fff4eb;
      color:#8a420c;
      border:1px solid #f0c3a1;
    }

    .invite-note{
      margin-top:16px;
      font-size:14px;
      color:#555;
      min-height:20px;
    }
  </style>
</head>
<body>
  <div class="invite-wrap">
    <div class="invite-card">
      <h1 class="invite-title">Invite User</h1>
      <div class="invite-sub">
        Send an access invitation by email. The user will receive a link to complete account setup.
      </div>

      <div class="invite-grid">
        <label>
          Email Address
          <input type="email" id="invite-email" placeholder="name@email.com" />
        </label>

        <label>
          Access Role
          <select id="invite-role">
            <option value="Admin">Admin</option>
            <option value="Editor" selected>Editor</option>
            <option value="View Only">View Only</option>
          </select>
        </label>
      </div>

      <div class="invite-actions">
        <button class="invite-btn primary" onclick="sendInvite()">Send Invite</button>
        <button class="invite-btn secondary" onclick="goBack()">Back</button>
      </div>

      <div id="invite-note" class="invite-note"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://vtglfaeyvmciieuntzhs.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_E1idmqAS85V-IVFdOqqV_w_smrIsLuP";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function goBack() {
      window.location.href = "./manage-user-access.html";
    }

    async function sendInvite() {
      const note = document.getElementById("invite-note");
      const email = (document.getElementById("invite-email").value || "").trim();
      const role = document.getElementById("invite-role").value;

      if (!email) {
        note.textContent = "Please enter an email address.";
        return;
      }

      note.textContent = "Sending invite...";

      try {
        const { data: sessionData } = await sb.auth.getSession();
        const accessToken = sessionData?.session?.access_token;

        if (!accessToken) {
          note.textContent = "You must be logged in first.";
          return;
        }

        const res = await fetch("https://vtglfaeyvmciieuntzhs.functions.supabase.co/invite-user", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + accessToken
          },
          body: JSON.stringify({
            email,
            role
          })
        });

        const result = await res.json();

        if (!res.ok) {
          note.textContent = result.error || "Failed to send invite.";
          return;
        }

        note.textContent = "Invite sent successfully to " + email + ".";
        document.getElementById("invite-email").value = "";
        document.getElementById("invite-role").value = "Editor";
      } catch (err) {
        console.error(err);
        note.textContent = "Unexpected error while sending invite.";
      }
    }
  </script>
</body>
</html>
